name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.3
        with:
          environments: dev
          manifest-path: pyproject.toml
          cache: true
          frozen: true

      - name: Lint (ruff check)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pixi run lint

      - name: Typecheck (mypy, error-count baseline)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pixi run typecheck > mypy.log || true
          tail -5 mypy.log
          count=$(grep -oE 'Found [0-9]+ error' mypy.log | grep -oE '[0-9]+' || echo 0)
          baseline=$(cat .mypy-baseline-count)
          echo "mypy errors: $count (baseline: $baseline)"
          if [ "$count" -gt "$baseline" ]; then
            echo "::error::New mypy errors introduced ($count > baseline $baseline). Fix them or, if legitimately unavoidable, update .mypy-baseline-count."
            exit 1
          fi

      # TODO: create separate action for running workflows
      - name: Run Pytest
        run: |
          pixi run test

      - name: Run Basic EPT Workflow
        if: always()
        run: |
          pixi run test-example-ept

      - name: Run Parallelized DSM Workflow
        if: always()
        run: |
          pixi run test-example-dsmfilter

      - name: Upload test artifacts
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: workflow-test-outputs
          path: /tmp/lidar-tools-test/
